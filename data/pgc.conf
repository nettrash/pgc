# 
# PostgreSQL Comparer Configuration
# 

# FROM
FROM_HOST=localhost
FROM_PORT=5432
FROM_USER=postgres
FROM_PASSWORD=postgres
FROM_DATABASE=service
FROM_SCHEME=service
FROM_SSL=true
FROM_DUMP=from.dump

# TO
TO_HOST=localhost
TO_PORT=5432
TO_USER=postgres
TO_PASSWORD=postgres
TO_DATABASE=service
TO_SCHEME=service
TO_SSL=false
TO_DUMP=to.dump

# OUTPUT
OUTPUT=delta.sql
USE_DROP=false

# Emit a migration script that is convenient to run against a live production
# database: indexes are built with CREATE INDEX CONCURRENTLY (and partition-aware
# ONLY parent + per-partition + ATTACH for partitioned tables), foreign keys are
# added NOT VALID and validated afterwards, and indexes are dropped with
# DROP INDEX CONCURRENTLY. The concurrent statements are emitted after the main
# transaction commits (so USE_SINGLE_TRANSACTION still wraps the rest).
# Default: false (output is identical to previous behaviour).
OUTPUT_FOR_PRODUCTION=false